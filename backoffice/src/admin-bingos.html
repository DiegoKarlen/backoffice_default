<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bingos · Backoffice</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
          var loc = localStorage.getItem('bo_locale');
          if (loc === 'en' || loc === 'es') document.documentElement.lang = loc;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="admin-bingos" data-bo-page="bingos">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content" data-bo-bingos-wrap>
        <div id="bo-bingos-msg" class="field-help" style="display:none;margin-bottom:12px;"></div>

        <!-- Vista lista (única visible al cargar) -->
        <section class="col-12 card" id="bo-bingos-list-view">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="bingoExtra.breadcrumbAdminBingos"></span>
              <h2 class="card-title" data-i18n="bingoExtra.listTitle"></h2>
            </div>
            <button type="button" class="btn btn--primary" id="bo-bingos-btn-new" data-i18n="bingo.btnNew"></button>
          </div>

          <div class="bo-list-filters">
            <div class="bo-list-filters__head">
              <span class="bo-list-filters__title" data-i18n="bingo.filtersSectionTitle"></span>
            </div>
          <form id="bo-bingo-filters-form" class="bo-bingo-filters bo-bingo-filters--list-align" action="#" method="get">
            <div class="field field--underline">
              <label class="field-label" for="bingo-filter-name" data-i18n="bingo.filterName"></label>
              <input id="bingo-filter-name" class="input input--underline" type="search" autocomplete="off" name="name" data-i18n-placeholder="bingo.filterNamePlaceholder">
            </div>
            <div class="field field--underline">
              <label class="field-label" for="bingo-filter-roomName" data-i18n="bingo.filterRoom"></label>
              <input id="bingo-filter-roomName" class="input input--underline" type="search" autocomplete="off" name="roomName" data-i18n-placeholder="bingo.filterRoomPlaceholder">
            </div>
            <div class="field field--underline">
              <label class="field-label" for="bingo-filter-status" data-i18n="bingo.filterStatus"></label>
              <select id="bingo-filter-status" class="input input--underline" name="status">
                <option value="">—</option>
                <option value="ACTIVE" data-i18n="bingo.statusActive"></option>
                <option value="INACTIVE" data-i18n="bingo.statusInactive"></option>
              </select>
            </div>
            <div class="field field--underline">
              <label class="field-label" for="bingo-filter-type" data-i18n="bingo.filterType"></label>
              <select id="bingo-filter-type" class="input input--underline" name="bingoType">
                <option value="">—</option>
                <option value="BINGO_75">75</option>
                <option value="BINGO_90">90</option>
              </select>
            </div>
            <button type="submit" class="btn btn--ghost" id="bo-bingo-filter-apply" data-i18n="bingo.applyFilters"></button>
          </form>
          </div>

          <div style="overflow:auto;">
            <table class="table">
              <thead>
                <tr>
                  <th data-i18n="bingo.colName"></th>
                  <th data-i18n="bingo.colRoom"></th>
                  <th data-i18n="bingo.colType"></th>
                  <th data-i18n="bingo.colStatus"></th>
                  <th data-i18n="bingo.colStart"></th>
                  <th data-i18n="bingo.colEnd"></th>
                  <th data-i18n="bingo.colRepeat"></th>
                  <th data-i18n="bingo.colCardPrice"></th>
                  <th data-i18n="bingo.colMinPlayers"></th>
                  <th style="text-align:right;" data-i18n="bingo.colActions"></th>
                </tr>
              </thead>
              <tbody id="bo-bingo-tbody"></tbody>
            </table>
          </div>
        </section>

        <!-- Crear bingo -->
        <section class="card" id="bo-bingo-create-panel" hidden style="margin-bottom:18px;">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="bingoExtra.breadcrumbAdminBingos"></span>
              <h2 class="card-title" data-i18n="bingoExtra.createTitle"></h2>
            </div>
          </div>

          <form id="bo-bingo-create-form" class="bo-form-profile">
            <div class="bo-form-profile__grid">
              <div class="field field--underline">
                <label class="field-label" for="create-roomId" data-i18n="bingo.labelRoom"></label>
                <select id="create-roomId" class="input input--underline" required></select>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-name" data-i18n="bingo.labelName"></label>
                <input id="create-name" class="input input--underline" type="text" required autocomplete="off">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-bingoType" data-i18n="bingo.labelBingoType"></label>
                <select id="create-bingoType" class="input input--underline" required>
                  <option value="BINGO_75" data-i18n="bingo.type75"></option>
                  <option value="BINGO_90" data-i18n="bingo.type90"></option>
                </select>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-start" data-i18n="bingo.labelStart"></label>
                <input id="create-start" class="input input--underline" type="datetime-local" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-end" data-i18n="bingo.labelEnd"></label>
                <input id="create-end" class="input input--underline" type="datetime-local" required>
                <p class="field-help" data-i18n="bingo.helpEnd"></p>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-repeatEveryMinutes" data-i18n="bingo.labelRepeatEvery"></label>
                <input id="create-repeatEveryMinutes" class="input input--underline" type="number" min="1" max="10080" placeholder="30" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-cardPrice" data-i18n="bingo.labelCardPrice"></label>
                <input id="create-cardPrice" class="input input--underline" type="text" inputmode="decimal" required value="1">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-minPlayersToStart" data-i18n="bingo.labelMinPlayersStart"></label>
                <input id="create-minPlayersToStart" class="input input--underline" type="number" min="1" max="100000" value="2" required>
              </div>
              <div class="field field--check-cell">
                <label class="check">
                  <input id="create-active" type="checkbox">
                  <span class="box"></span>
                  <span data-i18n="bingo.labelActive"></span>
                </label>
              </div>
            </div>

            <div class="field bo-form-profile__full bo-form-profile__roles-block">
              <span class="field-label" data-i18n="bingo.prizesTitle"></span>
              <div id="create-prizes"></div>
            </div>

            <div class="bo-form-profile__actions">
              <button type="button" class="bo-form-profile__cancel" id="bo-bingo-create-cancel" data-i18n="bingo.cancel"></button>
              <button type="submit" class="btn btn--primary" data-i18n="bingoExtra.saveChanges"></button>
            </div>
          </form>
        </section>

        <!-- Editar bingo -->
        <section class="col-12 card" id="bo-bingo-edit-panel" hidden>
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="bingoExtra.breadcrumbAdminBingos"></span>
              <h2 class="card-title" id="bo-bingo-edit-heading"></h2>
            </div>
          </div>
          <form id="bo-bingo-edit-form" class="bo-form-profile">
            <div class="bo-form-profile__grid">
              <div class="field field--underline">
                <label class="field-label" for="edit-roomId" data-i18n="bingo.labelRoom"></label>
                <select id="edit-roomId" class="input input--underline" required></select>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-name" data-i18n="bingo.labelName"></label>
                <input id="edit-name" class="input input--underline" type="text" required autocomplete="off">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-bingoType" data-i18n="bingo.labelBingoType"></label>
                <select id="edit-bingoType" class="input input--underline" required>
                  <option value="BINGO_75" data-i18n="bingo.type75"></option>
                  <option value="BINGO_90" data-i18n="bingo.type90"></option>
                </select>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-start" data-i18n="bingo.labelStart"></label>
                <input id="edit-start" class="input input--underline" type="datetime-local" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-end" data-i18n="bingo.labelEnd"></label>
                <input id="edit-end" class="input input--underline" type="datetime-local" required>
                <p class="field-help" data-i18n="bingo.helpEnd"></p>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-repeatEveryMinutes" data-i18n="bingo.labelRepeatEvery"></label>
                <input id="edit-repeatEveryMinutes" class="input input--underline" type="number" min="1" max="10080" placeholder="30" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-cardPrice" data-i18n="bingo.labelCardPrice"></label>
                <input id="edit-cardPrice" class="input input--underline" type="text" inputmode="decimal" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-minPlayersToStart" data-i18n="bingo.labelMinPlayersStart"></label>
                <input id="edit-minPlayersToStart" class="input input--underline" type="number" min="1" required>
              </div>
              <div class="field field--check-cell">
                <label class="check">
                  <input id="edit-active" type="checkbox">
                  <span class="box"></span>
                  <span data-i18n="bingo.labelActive"></span>
                </label>
              </div>
            </div>

            <div class="field bo-form-profile__full bo-form-profile__roles-block">
              <span class="field-label" data-i18n="bingo.prizesTitle"></span>
              <div id="edit-prizes"></div>
            </div>

            <div class="bo-form-profile__actions">
              <button type="button" class="bo-form-profile__cancel" id="bo-bingo-edit-cancel" data-i18n="bingo.cancel"></button>
              <button type="submit" class="btn btn--primary" id="bo-bingo-edit-save" data-i18n="bingoExtra.saveChanges"></button>
            </div>
          </form>
        </section>

        <dialog id="bo-bingo-rounds-dialog" class="bo-bingo-rounds-dialog">
          <div class="bo-rounds-dialog__surface">
            <header class="bo-rounds-dialog__head">
              <div class="bo-rounds-dialog__head-text">
                <span class="eyebrow" data-i18n="bingo.roundsEyebrow"></span>
                <h3 class="bo-rounds-dialog__title" id="bo-bingo-rounds-heading"></h3>
              </div>
              <button type="button" class="btn btn--ghost btn--sm" id="bo-bingo-rounds-close" aria-label="Close">×</button>
            </header>

            <section class="bo-rounds-dialog__filters-wrap">
              <form id="bo-rounds-filters-form" class="bo-bingo-filters bo-rounds-dialog__filters" action="#" method="get">
                <div class="field field--underline">
                  <label class="field-label" for="bo-rounds-filter-from" data-i18n="bingo.roundsFilterFrom"></label>
                  <input id="bo-rounds-filter-from" class="input input--underline" type="datetime-local" autocomplete="off" name="from">
                </div>
                <div class="field field--underline">
                  <label class="field-label" for="bo-rounds-filter-to" data-i18n="bingo.roundsFilterTo"></label>
                  <input id="bo-rounds-filter-to" class="input input--underline" type="datetime-local" autocomplete="off" name="to">
                </div>
                <div class="field field--underline bo-rounds-dialog__field-seq">
                  <label class="field-label" for="bo-rounds-filter-sequence" data-i18n="bingo.roundsFilterSequence"></label>
                  <input id="bo-rounds-filter-sequence" class="input input--underline mono" type="number" min="1" step="1" placeholder="#" autocomplete="off" name="sequence">
                </div>
                <button type="submit" class="btn btn--ghost" id="bo-rounds-filter-apply" data-i18n="bingo.roundsFilterApply"></button>
                <button type="button" class="btn btn--ghost" id="bo-rounds-filter-clear" data-i18n="bingo.roundsFilterClear"></button>
              </form>
            </section>

            <div class="bo-rounds-dialog__scroll">
              <div class="bo-rounds-dialog__body" id="bo-bingo-rounds-content"></div>
            </div>

            <footer class="bo-rounds-dialog__foot">
              <button type="button" class="btn btn--primary" id="bo-bingo-rounds-dismiss" data-i18n="bingo.roundsClose"></button>
            </footer>
          </div>
        </dialog>

        <div data-shell-footer></div>
        </main>
      </div>
    </div>
  </body>
</html>
