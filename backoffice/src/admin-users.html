<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Users · Backoffice</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
          var loc = localStorage.getItem('bo_locale');
          if (loc === 'en' || loc === 'es') document.documentElement.lang = loc;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="admin-users" data-bo-page="users">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content" data-bo-users-wrap>
        <section class="hero">
          <div class="hero-text">
            <span class="eyebrow" data-i18n="users.eyebrow"></span>
            <h1 class="hero-title" data-i18n="users.title"></h1>
            <p class="hero-sub" data-i18n="users.subtitle"></p>
          </div>
        </section>

        <div id="bo-users-msg" class="field-help" style="display:none;margin-bottom:12px;"></div>

        <section class="card" style="margin-bottom: 18px;">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="usersExtra.createEyebrow"></span>
              <h2 class="card-title" data-i18n="usersExtra.createTitle"></h2>
            </div>
          </div>
          <form id="bo-user-create-form" class="form-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;align-items:end;">
            <div class="field span-2">
              <label class="field-label" for="create-email" data-i18n="users.colEmail"></label>
              <input id="create-email" class="input" type="email" required autocomplete="off" data-i18n-placeholder="users.placeholderEmail">
            </div>
            <div class="field">
              <label class="field-label" for="create-password" data-i18n="usersExtra.labelPassword"></label>
              <input id="create-password" class="input" type="password" required minlength="8" autocomplete="new-password">
            </div>
            <div class="field">
              <label class="field-label" for="create-displayName" data-i18n="users.labelDisplayName"></label>
              <input id="create-displayName" class="input" type="text">
            </div>
            <div class="field">
              <label class="check">
                <input id="create-active" type="checkbox" checked>
                <span class="box"></span>
                <span data-i18n="users.labelActive"></span>
              </label>
            </div>
            <div class="field span-2">
              <span class="field-label" data-i18n="users.labelRoles"></span>
              <div id="create-roles"></div>
            </div>
            <div class="field">
              <button type="submit" class="btn btn--primary" data-i18n="usersExtra.createTitle"></button>
            </div>
          </form>
        </section>

        <section class="col-12 card" id="bo-user-edit-panel" hidden>
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="usersExtra.editEyebrow"></span>
              <h2 class="card-title"><span id="bo-user-edit-heading"></span> <span id="edit-email"></span></h2>
            </div>
          </div>
          <div class="form-grid" style="display:grid;gap:16px;">
            <div class="field">
              <label class="field-label" for="edit-displayName" data-i18n="users.labelDisplayName"></label>
              <input id="edit-displayName" class="input" type="text">
            </div>
            <div class="field">
              <label class="field-label" for="edit-password" data-i18n="usersExtra.labelNewPasswordOptional"></label>
              <input id="edit-password" class="input" type="password" minlength="8" autocomplete="new-password">
            </div>
            <div class="field">
              <label class="check">
                <input id="edit-active" type="checkbox" checked>
                <span class="box"></span>
                <span data-i18n="users.labelActive"></span>
              </label>
            </div>
            <div class="field span-2">
              <span class="field-label" data-i18n="users.labelRoles"></span>
              <div id="edit-roles"></div>
            </div>
            <div style="display:flex;gap:10px;">
              <button type="button" class="btn btn--primary" id="bo-user-edit-save" data-i18n="users.save"></button>
              <button type="button" class="btn btn--ghost" id="bo-user-edit-cancel" data-i18n="users.cancel"></button>
            </div>
          </div>
        </section>

        <section class="col-12 card">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="usersExtra.directoryEyebrow"></span>
              <h2 class="card-title" data-i18n="usersExtra.directoryTitle"></h2>
            </div>
          </div>
          <div style="overflow:auto;">
            <table class="table">
              <thead>
                <tr>
                  <th data-i18n="users.colEmail"></th>
                  <th data-i18n="users.colName"></th>
                  <th data-i18n="users.colStatus"></th>
                  <th data-i18n="users.colRoles"></th>
                  <th style="text-align:right;" data-i18n="users.colActions"></th>
                </tr>
              </thead>
              <tbody id="bo-users-tbody"></tbody>
            </table>
          </div>
        </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
