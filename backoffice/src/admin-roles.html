<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roles · Backoffice</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
          var loc = localStorage.getItem('bo_locale');
          if (loc === 'en' || loc === 'es') document.documentElement.lang = loc;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="admin-roles" data-bo-page="roles">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content" data-bo-roles-wrap>
        <div id="bo-roles-msg" class="field-help" style="display:none;margin-bottom:12px;"></div>

        <section class="col-12 card" id="bo-roles-list-view">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="rolesExtra.breadcrumbAdminRoles"></span>
              <h2 class="card-title" data-i18n="rolesExtra.listTitle"></h2>
            </div>
            <button type="button" class="btn btn--primary" id="bo-roles-btn-new" data-i18n="roles.btnNew"></button>
          </div>
          <div style="overflow:auto;">
            <table class="table">
              <thead>
                <tr>
                  <th data-i18n="roles.colCode"></th>
                  <th data-i18n="roles.colName"></th>
                  <th data-i18n="rolesExtra.colDesc"></th>
                  <th data-i18n="rolesExtra.colCount"></th>
                  <th style="text-align:right;" data-i18n="roles.colActions"></th>
                </tr>
              </thead>
              <tbody id="bo-roles-tbody"></tbody>
            </table>
          </div>
        </section>

        <section class="card" id="bo-role-create-panel" hidden style="margin-bottom:18px;">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="rolesExtra.breadcrumbAdminRoles"></span>
              <h2 class="card-title" data-i18n="rolesExtra.createTitle"></h2>
            </div>
          </div>
          <form id="bo-role-create-form" class="bo-form-profile">
            <div class="bo-form-profile__grid">
              <div class="field field--underline">
                <label class="field-label" for="create-role-code" data-i18n="roles.labelCode"></label>
                <input id="create-role-code" class="input input--underline" required data-i18n-placeholder="roles.placeholderCode">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-role-name" data-i18n="roles.labelName"></label>
                <input id="create-role-name" class="input input--underline" required>
              </div>
              <div class="field field--underline bo-form-profile__full">
                <label class="field-label" for="create-role-desc" data-i18n="roles.labelDesc"></label>
                <input id="create-role-desc" class="input input--underline" type="text">
              </div>
            </div>
            <div class="field bo-form-profile__full bo-form-profile__roles-block">
              <span class="field-label" data-i18n="roles.labelFuncs"></span>
              <div id="create-role-funcs"></div>
            </div>
            <div class="bo-form-profile__actions">
              <button type="button" class="bo-form-profile__cancel" id="bo-role-create-cancel" data-i18n="roles.cancel"></button>
              <button type="submit" class="btn btn--primary" data-i18n="rolesExtra.saveChanges"></button>
            </div>
          </form>
        </section>

        <section class="col-12 card" id="bo-role-edit-panel" hidden>
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="rolesExtra.breadcrumbAdminRoles"></span>
              <h2 class="card-title" id="bo-role-edit-heading"></h2>
            </div>
          </div>
          <div class="bo-form-profile">
            <div class="bo-form-profile__grid">
              <div class="field field--underline field--readonly bo-form-profile__full">
                <label class="field-label" for="edit-role-code-display" data-i18n="roles.labelCode"></label>
                <input id="edit-role-code-display" class="input input--underline" type="text" readonly aria-readonly="true" autocomplete="off">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-role-name" data-i18n="roles.labelName"></label>
                <input id="edit-role-name" class="input input--underline" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-role-desc" data-i18n="roles.labelDesc"></label>
                <input id="edit-role-desc" class="input input--underline" type="text">
              </div>
            </div>
            <div class="field bo-form-profile__full bo-form-profile__roles-block">
              <span class="field-label" data-i18n="roles.labelFuncs"></span>
              <div id="edit-role-funcs"></div>
            </div>
            <div class="bo-form-profile__actions">
              <button type="button" class="bo-form-profile__cancel" id="bo-role-edit-cancel" data-i18n="roles.cancel"></button>
              <button type="button" class="btn btn--primary" id="bo-role-edit-save" data-i18n="rolesExtra.saveChanges"></button>
            </div>
          </div>
        </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
