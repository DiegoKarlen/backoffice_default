<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Functionalities · Backoffice</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
          var loc = localStorage.getItem('bo_locale');
          if (loc === 'en' || loc === 'es') document.documentElement.lang = loc;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="admin-functionalities" data-bo-page="functionalities">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content" data-bo-func-wrap>
        <div id="bo-func-msg" class="field-help" style="display:none;margin-bottom:12px;"></div>

        <section class="col-12 card" id="bo-func-list-view">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="funcExtra.breadcrumbAdminFunc"></span>
              <h2 class="card-title" data-i18n="funcExtra.listTitle"></h2>
            </div>
            <button type="button" class="btn btn--primary" id="bo-func-btn-new" data-i18n="func.btnNew"></button>
          </div>
          <div style="overflow:auto;">
            <table class="table">
              <thead>
                <tr>
                  <th data-i18n="func.colCode"></th>
                  <th data-i18n="func.colName"></th>
                  <th data-i18n="func.colModule"></th>
                  <th data-i18n="funcExtra.colDesc"></th>
                  <th style="text-align:right;" data-i18n="func.colActions"></th>
                </tr>
              </thead>
              <tbody id="bo-func-tbody"></tbody>
            </table>
          </div>
        </section>

        <section class="card" id="bo-func-create-panel" hidden style="margin-bottom:18px;">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="funcExtra.breadcrumbAdminFunc"></span>
              <h2 class="card-title" data-i18n="funcExtra.createTitle"></h2>
            </div>
          </div>
          <form id="bo-func-create-form" class="bo-form-profile">
            <div class="bo-form-profile__grid">
              <div class="field field--underline">
                <label class="field-label" for="create-func-code" data-i18n="func.labelCode"></label>
                <input id="create-func-code" class="input input--underline" required data-i18n-placeholder="func.placeholderCode">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-func-name" data-i18n="func.labelName"></label>
                <input id="create-func-name" class="input input--underline" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-func-module" data-i18n="func.labelModule"></label>
                <input id="create-func-module" class="input input--underline" data-i18n-placeholder="func.placeholderModule">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="create-func-desc" data-i18n="func.labelDesc"></label>
                <input id="create-func-desc" class="input input--underline" type="text">
              </div>
            </div>
            <div class="bo-form-profile__actions">
              <button type="button" class="bo-form-profile__cancel" id="bo-func-create-cancel" data-i18n="func.cancel"></button>
              <button type="submit" class="btn btn--primary" data-i18n="funcExtra.saveChanges"></button>
            </div>
          </form>
        </section>

        <section class="col-12 card" id="bo-func-edit-panel" hidden>
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="eyebrow" data-i18n="funcExtra.breadcrumbAdminFunc"></span>
              <h2 class="card-title" id="bo-func-edit-heading"></h2>
            </div>
          </div>
          <div class="bo-form-profile">
            <div class="bo-form-profile__grid">
              <div class="field field--underline field--readonly bo-form-profile__full">
                <label class="field-label" for="edit-func-code-display" data-i18n="func.labelCode"></label>
                <input id="edit-func-code-display" class="input input--underline" type="text" readonly aria-readonly="true" autocomplete="off">
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-func-name" data-i18n="func.labelName"></label>
                <input id="edit-func-name" class="input input--underline" required>
              </div>
              <div class="field field--underline">
                <label class="field-label" for="edit-func-module" data-i18n="func.labelModule"></label>
                <input id="edit-func-module" class="input input--underline">
              </div>
              <div class="field field--underline bo-form-profile__full">
                <label class="field-label" for="edit-func-desc" data-i18n="func.labelDesc"></label>
                <input id="edit-func-desc" class="input input--underline" type="text">
              </div>
            </div>
            <div class="bo-form-profile__actions">
              <button type="button" class="bo-form-profile__cancel" id="bo-func-edit-cancel" data-i18n="func.cancel"></button>
              <button type="button" class="btn btn--primary" id="bo-func-edit-save" data-i18n="funcExtra.saveChanges"></button>
            </div>
          </div>
        </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
